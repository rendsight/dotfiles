background {
	monitor =
	path = ~/downloads/liquid.jpg

	blur_passes = 3
	blur_size = 8
	noise = 0.0117
	contrast = 0.8916
	brightness = 0.8172
	vibrancy = 0.1696
	vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 256px, 40px

    font_family = IBM Plex Sans
    
    outline_thickness = 1
    inner_color = rgba(0, 0, 0, 0.25)

    outer_color = rgba(ffffff00)
    check_color = rgba(ffffff00)
    fail_color = rgba(ffffff00)

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = -1

    position = 0, -20
    halign = center
    valign = center

    dots_size = 0.125
    dots_spacing = 0.5
}
