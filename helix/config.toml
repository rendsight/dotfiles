theme = "base16_transparent"

[editor]
line-number = "relative"

[editor.lsp]
auto-signature-help = false

[editor.cursor-shape]
insert = "bar"
normal = "block"

[editor.file-picker]
hidden = false

[keys.normal]
esc = ["collapse_selection", "keep_primary_selection"]

[keys.select]
esc = ["collapse_selection", "keep_primary_selection", "normal_mode"]
